<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle">Dark Mode</button>
        <h1>Lotto Number Generator</h1>
        <div class="lotto-machine">
            <div id="numbers" class="number-container"></div>
        </div>
        <button id="generate" class="btn">Generate Numbers</button>

        <div class="contact-section">
            <h3>Send Feedback</h3>
            <form action="https://formspree.io/f/xykaljeg" method="POST">
                <input type="email" name="email" placeholder="Your email" required>
                <textarea name="message" placeholder="Your message" required></textarea>
                <button type="submit" class="btn btn-small">Send</button>
            </form>
        </div>

        <div class="contact-section">
            <h3>Partnership Inquiry</h3>
            <form action="https://formspree.io/f/xykaljeg" method="POST">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="text" name="company" placeholder="Company Name" required>
                <input type="email" name="email" placeholder="Business Email" required>
                <select name="inquiry_type" class="form-select">
                    <option value="marketing">Marketing Partnership</option>
                    <option value="technical">Technical Integration</option>
                    <option value="business">Business Development</option>
                    <option value="other">Other</option>
                </select>
                <textarea name="message" placeholder="Proposal details" required></textarea>
                <button type="submit" class="btn btn-small">Submit Proposal</button>
            </form>
        </div>

        <div class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.

                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */

                var d = document, s = d.createElement('script');
                s.src = 'https://samkoo-test.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
